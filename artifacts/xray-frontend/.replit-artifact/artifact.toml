kind = "web"
previewPath = "/"
title = "X-Ray AI Lung Diagnosis Assistant"
version = "1.0.0"
id = "artifacts/xray-frontend"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22668

[services.development]
run = "pnpm --filter @workspace/xray-frontend run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/xray-frontend", "run", "build" ]
publicDir = "artifacts/xray-frontend/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22668"
BASE_PATH = "/"

[[services]]
name = "ml-backend"
paths = [ "/ml-api" ]
localPort = 8090

[services.development]
run = "bash /home/runner/workspace/python-backend/start.sh"

[services.production]
run = [ "bash", "/home/runner/workspace/python-backend/start.sh" ]

[services.env]
PORT = "8090"
